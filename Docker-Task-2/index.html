<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashish Nehra - Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            width: 400px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 { font-size: 28px; margin-bottom: 5px; color: #e94560; }
        .role { color: #a8b2d8; margin-bottom: 25px; font-size: 14px; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .info-box {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .info-box .label { font-size: 11px; color: #a8b2d8; margin-bottom: 5px; }
        .info-box .value { font-size: 14px; font-weight: bold; }
        .tech-stack { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .badge {
            background: #e94560;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .footer { margin-top: 20px; font-size: 12px; color: #a8b2d8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">👨‍💻</div>
        <h1>Ashish Nehra</h1>
        <p class="role">Cloud & DevOps Engineer</p>
        <div class="info-grid">
            <div class="info-box">
                <div class="label">📍 Location</div>
                <div class="value">India</div>
            </div>
            <div class="info-box">
                <div class="label">🎓 Education</div>
                <div class="value">B.Tech</div>
            </div>
            <div class="info-box">
                <div class="label">☁️ Cloud</div>
                <div class="value">AWS</div>
            </div>
            <div class="info-box">
                <div class="label">🐳 Container</div>
                <div class="value">Docker</div>
            </div>
        </div>
        <div class="tech-stack">
            <span class="badge">AWS EC2</span>
            <span class="badge">Docker</span>
            <span class="badge">Linux</span>
            <span class="badge">Git</span>
        </div>
        <div class="footer">🚀 Deployed via Docker on AWS EC2</div>
    </div>
</body>
</html>
